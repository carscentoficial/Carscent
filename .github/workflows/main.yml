<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarScent — Aromatizadores Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F0E8;--bg2:#EDE7DB;--dark:#18140F;
  --wood-dark:#3E2410;--wood-mid:#7B4F2E;
  --green:#1A6647;--green2:#24875E;--accent:#BF9460;
  --muted:#8A7D6E;--border:rgba(74,46,26,0.13);
}
html{scroll-behavior:smooth;}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--dark);overflow-x:hidden;}

/* CART */
#cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:900;opacity:0;pointer-events:none;transition:opacity .3s;}
#cart-overlay.open{opacity:1;pointer-events:all;}
#cart-panel{position:fixed;top:0;right:-440px;width:420px;max-width:100vw;height:100vh;background:white;z-index:901;display:flex;flex-direction:column;transition:right .35s cubic-bezier(.4,0,.2,1);}
#cart-panel.open{right:0;}
.cphead{padding:1.5rem 1.75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cphead h2{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:400;}
.cclose{background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--muted);}
.citems{flex:1;overflow-y:auto;padding:1.25rem 1.75rem;}
.cempty{text-align:center;padding:3rem 1rem;color:var(--muted);}
.cempty-icon{font-size:2.5rem;margin-bottom:1rem;opacity:.4;}
.citem{display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border);align-items:center;}
.citem-icon{width:64px;height:44px;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:3px;overflow:hidden;}
.citem-info{flex:1;}
.citem-name{font-size:.88rem;font-weight:500;margin-bottom:.15rem;}
.citem-price{font-size:.82rem;color:var(--muted);}
.citem-qty{display:flex;align-items:center;gap:8px;margin-top:.4rem;}
.qbtn{width:24px;height:24px;border:1px solid var(--border);background:none;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.qbtn:hover{background:var(--bg2);}
.qnum{font-size:.85rem;font-weight:500;min-width:16px;text-align:center;}
.cremove{background:none;border:none;cursor:pointer;color:var(--muted);font-size:.82rem;padding:4px;transition:color .15s;}
.cremove:hover{color:#c0392b;}
.cfooter{padding:1.5rem 1.75rem;border-top:1px solid var(--border);}
.ctotal-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1.25rem;}
.ctotal-label{font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.ctotal-amt{font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;}
.ccheckout{display:block;width:100%;background:var(--green);color:white;border:none;padding:1rem;font-family:'Jost',sans-serif;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background .2s;}
.ccheckout:hover{background:var(--green2);}
.cbadge{position:absolute;top:-7px;right:-7px;background:var(--green);color:white;border-radius:50%;width:18px;height:18px;font-size:.6rem;font-weight:500;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.cbadge.on{opacity:1;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.1rem 3.5rem;display:flex;align-items:center;justify-content:space-between;background:rgba(245,240,232,.93);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-logo-text{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:400;color:var(--dark);letter-spacing:.02em;}
.nav-logo-text span{color:var(--green);}
nav ul{list-style:none;display:flex;gap:2.5rem;}
nav ul a{font-size:.78rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s;}
nav ul a:hover{color:var(--dark);}
.nav-cart{background:none;border:1px solid var(--border);padding:.5rem 1rem;cursor:pointer;font-family:'Jost',sans-serif;font-size:.78rem;color:var(--dark);position:relative;display:flex;align-items:center;gap:.45rem;transition:border-color .2s,background .2s;letter-spacing:.06em;}
.nav-cart:hover{background:white;border-color:var(--wood-mid);}

/* HERO */
.hero{min-height:100vh;display:grid;grid-template-columns:55fr 45fr;padding-top:72px;}
.hero-l{display:flex;flex-direction:column;justify-content:center;padding:5rem 3.5rem 5rem 4rem;}
.eyebrow{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--green);font-weight:500;margin-bottom:1.6rem;display:flex;align-items:center;gap:.7rem;}
.eyebrow::before{content:'';width:28px;height:1px;background:var(--green);}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,4.5vw,4.5rem);font-weight:400;line-height:1.1;color:var(--dark);margin-bottom:1.6rem;}
.hero h1 em{font-style:italic;color:var(--wood-mid);}
.hero-sub{font-size:.97rem;line-height:1.85;color:var(--muted);max-width:400px;margin-bottom:2.5rem;font-weight:300;}
.hero-btns{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;}
.btn-dark{background:var(--dark);color:white;padding:.85rem 1.9rem;font-family:'Jost',sans-serif;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:background .2s;}
.btn-dark:hover{background:var(--wood-dark);}
.btn-ghost{color:var(--dark);font-size:.82rem;letter-spacing:.06em;text-decoration:none;border-bottom:1px solid var(--dark);padding-bottom:2px;transition:color .2s,border-color .2s;}
.btn-ghost:hover{color:var(--green);border-color:var(--green);}
.hero-r{background:linear-gradient(145deg,#D6CABC 0%,#C4B49E 60%,#B8A48C 100%);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.hero-r::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 40%,rgba(255,255,255,.18) 0%,transparent 65%);}
.hero-stage{display:flex;flex-direction:column;align-items:center;gap:1.5rem;animation:floatY 4s ease-in-out infinite;}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
.hero-label{background:rgba(255,255,255,.78);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.5);padding:.55rem 1.1rem;font-size:.72rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--wood-dark);}

/* STRIP */
.strip{background:var(--dark);padding:1.1rem 4rem;display:flex;align-items:center;justify-content:center;gap:3rem;flex-wrap:wrap;}
.s-item{font-size:.72rem;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:.55rem;}
.s-dot{width:3px;height:3px;background:var(--accent);border-radius:50%;}

/* SHARED */
.sec-label{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--green);font-weight:500;margin-bottom:.9rem;}
.sec-h2{font-family:'Playfair Display',serif;font-size:clamp(1.9rem,3vw,2.9rem);font-weight:400;line-height:1.2;color:var(--dark);}
.sec-h2 em{font-style:italic;color:var(--wood-mid);}

/* ABOUT */
.about{padding:6rem 4rem;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;max-width:1180px;margin:0 auto;}
.about-text .sec-h2{margin-bottom:1.4rem;}
.about-text p{font-size:.95rem;line-height:1.9;color:var(--muted);margin-bottom:.9rem;font-weight:300;}
.about-frame{background:linear-gradient(140deg,#C8BAA6,#B5A08A);aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.about-frame::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 28%,rgba(255,255,255,.13),transparent 65%);pointer-events:none;}

/* FEATURES */
.features{background:var(--dark);padding:5rem 4rem;}
.feat-head{text-align:center;margin-bottom:3rem;}
.feat-head .sec-label{color:var(--accent);}
.feat-head .sec-h2{color:white;margin-top:.4rem;}
.feat-head .sec-h2 em{color:var(--accent);}
.feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5px;max-width:1100px;margin:0 auto;background:rgba(255,255,255,.07);}
.feat-card{background:var(--dark);padding:2.5rem 2rem;transition:background .3s;}
.feat-card:hover{background:#1F1B14;}
.feat-ico{width:42px;height:42px;border:1px solid rgba(255,255,255,.13);display:flex;align-items:center;justify-content:center;margin-bottom:1.4rem;font-size:1.1rem;}
.feat-card h3{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400;color:white;margin-bottom:.65rem;}
.feat-card p{font-size:.82rem;line-height:1.7;color:rgba(255,255,255,.45);}

/* PRODUCTS */
.products{padding:6rem 4rem;max-width:1180px;margin:0 auto;}
.prod-head{margin-bottom:2.75rem;}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
.prod-card{background:white;border:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;overflow:hidden;transition:box-shadow .3s;}
.prod-card:hover{box-shadow:0 18px 50px rgba(0,0,0,.08);}
.prod-img{display:flex;align-items:center;justify-content:center;padding:2rem;min-height:260px;}
.prod-info{padding:2rem 1.75rem;display:flex;flex-direction:column;justify-content:space-between;}
.prod-tag{font-size:.67rem;letter-spacing:.16em;text-transform:uppercase;color:var(--green);font-weight:500;margin-bottom:.7rem;}
.prod-info h3{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:400;color:var(--dark);margin-bottom:.7rem;line-height:1.25;}
.prod-info p{font-size:.83rem;line-height:1.75;color:var(--muted);margin-bottom:1.2rem;flex:1;font-weight:300;}
.price-row{display:flex;align-items:baseline;gap:.4rem;margin-bottom:.9rem;}
.price{font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;color:var(--dark);}
.price-cur{font-size:.95rem;color:var(--muted);}
.btn-add{display:block;width:100%;background:var(--dark);color:white;text-align:center;padding:.72rem;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;border:none;cursor:pointer;font-family:'Jost',sans-serif;transition:background .2s;}
.btn-add:hover{background:var(--green);}

/* SCENTS */
.scents{background:var(--bg2);padding:5rem 4rem;}
.scents-inner{max-width:860px;margin:0 auto;text-align:center;}
.scents-inner .sec-h2{margin:.4rem 0 .9rem;}
.scents-inner>p{font-size:.93rem;color:var(--muted);max-width:440px;margin:0 auto 2.75rem;line-height:1.85;font-weight:300;}
.scents-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:640px;margin:0 auto;}
.scent-card{background:white;border:1px solid var(--border);padding:1.75rem 1rem;text-align:center;transition:transform .2s,box-shadow .2s;}
.scent-card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.07);}
.scent-orb{width:52px;height:52px;border-radius:50%;margin:0 auto 1rem;}
.scent-name{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:400;color:var(--dark);margin-bottom:.3rem;}
.scent-desc{font-size:.75rem;color:var(--muted);line-height:1.6;}

/* SEGMENT */
.segment{padding:6rem 4rem;max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;}
.segment .sec-h2{margin-bottom:1.4rem;}
.segment p{font-size:.95rem;line-height:1.9;color:var(--muted);margin-bottom:.9rem;font-weight:300;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1.75rem;}
.stat-box{background:white;border:1px solid var(--border);padding:1.4rem;text-align:center;}
.stat-num{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:400;color:var(--dark);display:block;}
.stat-lbl{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:.2rem;display:block;}
.seg-visual{background:linear-gradient(140deg,#C8BAA6,#B0997E);padding:3rem;display:flex;align-items:center;justify-content:center;aspect-ratio:4/3;}

/* CTA */
.cta{background:var(--green);padding:5rem 4rem;text-align:center;}
.cta h2{font-family:'Playfair Display',serif;font-size:clamp(2rem,3.5vw,3.2rem);font-weight:400;color:white;margin-bottom:1rem;line-height:1.2;}
.cta h2 em{font-style:italic;}
.cta p{font-size:.95rem;color:rgba(255,255,255,.75);max-width:480px;margin:0 auto 2.25rem;line-height:1.85;font-weight:300;}
.cta-links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
.btn-wh{background:white;color:var(--green);padding:.85rem 2rem;font-family:'Jost',sans-serif;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:opacity .2s;}
.btn-wh:hover{opacity:.9;}
.btn-ig{background:transparent;color:white;padding:.85rem 2rem;font-family:'Jost',sans-serif;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(255,255,255,.45);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;transition:border-color .2s;}
.btn-ig:hover{border-color:white;}

/* FOOTER */
footer{background:var(--dark);padding:2.5rem 4rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1.25rem;}
.foot-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.foot-logo-text{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:400;color:white;letter-spacing:.02em;}
.foot-logo-text span{color:var(--accent);}
footer p{font-size:.75rem;color:rgba(255,255,255,.35);}
.foot-links{display:flex;gap:1.75rem;}
.foot-links a{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);text-decoration:none;transition:color .2s;}
.foot-links a:hover{color:white;}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(16px);background:var(--dark);color:white;padding:.7rem 1.4rem;font-size:.82rem;letter-spacing:.04em;opacity:0;transition:all .28s;pointer-events:none;z-index:2000;white-space:nowrap;border-left:3px solid var(--green);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:900px){
nav{padding:1rem 1.5rem;}nav ul{display:none;}
.hero{grid-template-columns:1fr;min-height:auto;}
.hero-r{min-height:60vw;}
.hero-l{padding:3rem 2rem;}
.about,.segment{grid-template-columns:1fr;gap:2rem;padding:3rem 2rem;}
.feat-grid{grid-template-columns:1fr 1fr;}
.products{padding:3rem 2rem;}
.prod-grid{grid-template-columns:1fr;}
.scents{padding:3rem 2rem;}
.strip{padding:1rem 2rem;gap:1.5rem;}
.cta{padding:3rem 2rem;}
footer{padding:2rem;flex-direction:column;align-items:flex-start;}
#cart-panel{width:100vw;}
}
</style>
</head>
<body>

<!-- CART -->
<div id="cart-overlay" onclick="closeCart()"></div>
<div id="cart-panel">
  <div class="cphead">
    <h2>Tu carrito</h2>
    <button class="cclose" onclick="closeCart()">✕</button>
  </div>
  <div class="citems" id="ci">
    <div class="cempty" id="cempty">
      <div class="cempty-icon">🛒</div>
      <p>Tu carrito está vacío.<br>¡Agregá un producto!</p>
    </div>
  </div>
  <div class="cfooter">
    <div class="ctotal-row">
      <span class="ctotal-label">Total</span>
      <span class="ctotal-amt" id="ctotal">$0</span>
    </div>
    <button class="ccheckout" onclick="checkout()">Finalizar pedido →</button>
  </div>
</div>

<!-- NAV -->
<nav>
  <a href="#" class="nav-logo">
    <svg width="28" height="34" viewBox="0 0 28 34" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 1C11 7.5 9.5 12 11.5 16.5C9.5 14 9 11 10 8C8 11.5 7 16 8.5 20.5C7.5 18.5 7 16.5 7 14.5C6.5 16 6.5 18 7 20C7 25.5 10.5 29.5 15 29.5C13 27.5 12 25 12.5 22.5C13.5 25 15.5 26.5 17 25.5C19.5 24 20 20.5 18.5 17.5C19.5 19.5 19 22 17.5 23C19.5 20.5 19.5 16.5 17 13C18 15.5 18 18.5 16.5 20C17 16 16 10 14 1Z" fill="#1A6647"/>
      <path d="M14 1C11.5 7 10.5 12.5 12.5 17C11 14.5 10.5 11.5 11.5 8.5C9.5 12 8.5 16.5 10 21C9 19 8.5 17 8.5 15C8 16.5 7.8 18.2 8 20C8 25.5 11.5 29.5 16 29.5C13.8 28 12.8 25.5 13.2 23C14.2 25 16 26.5 17.5 25.8C20 24.5 20.5 21 19 18C20 20 19.5 22.5 18 23.5C20 21 20 17 17.5 13.5C18.5 16 18.5 19 17 20.5C17.5 16.5 16.5 10.5 14 1Z" fill="#24875E" opacity="0.5"/>
      <ellipse cx="14.5" cy="31.5" rx="5.5" ry="2" fill="#1A6647" opacity="0.2"/>
    </svg>
    <div class="nav-logo-text">Car<span>Scent</span></div>
  </a>
  <ul>
    <li><a href="#producto">Producto</a></li>
    <li><a href="#fragancias">Fragancias</a></li>
    <li><a href="#nosotros">Nosotros</a></li>
    <li><a href="#contacto">Contacto</a></li>
  </ul>
  <button class="nav-cart" onclick="openCart()">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M1 1h2l1.5 7h7l1.5-5H4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6.5" cy="12.5" r="1" fill="currentColor"/><circle cx="11.5" cy="12.5" r="1" fill="currentColor"/></svg>
    Carrito
    <span class="cbadge" id="cbadge">0</span>
  </button>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-l">
    <div class="eyebrow">Diseño Premium · Buenos Aires</div>
    <h1>Tu auto merece<br>un <em>aroma</em><br>extraordinario</h1>
    <p class="hero-sub">Aromatizadores de madera artesanal con cierre magnético, diseñados para elevar cada trayecto en una experiencia de confort y distinción.</p>
    <div class="hero-btns">
      <a href="#producto" class="btn-dark">Ver productos</a>
      <a href="#nosotros" class="btn-ghost">Conocer más →</a>
    </div>
  </div>
  <div class="hero-r">
    <div class="hero-stage">
      <!-- Producto hero: cápsula ancha de madera con vetas, ranura fina, clip negro atrás -->
      <svg width="360" height="230" viewBox="0 0 360 230" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="hw" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#C89560"/>
            <stop offset="15%"  stop-color="#A87240"/>
            <stop offset="35%"  stop-color="#8C5C2C"/>
            <stop offset="55%"  stop-color="#9A6835"/>
            <stop offset="75%"  stop-color="#7E4E25"/>
            <stop offset="100%" stop-color="#5E3415"/>
          </linearGradient>
          <linearGradient id="hs" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="rgba(255,240,210,0.38)"/>
            <stop offset="60%"  stop-color="rgba(255,240,210,0.06)"/>
            <stop offset="100%" stop-color="rgba(255,240,210,0)"/>
          </linearGradient>
          <linearGradient id="hbot" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#7A4E26"/>
            <stop offset="100%" stop-color="#3C2008"/>
          </linearGradient>
          <linearGradient id="hcl" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#302820"/>
            <stop offset="100%" stop-color="#0C0906"/>
          </linearGradient>
          <filter id="hsh" x="-12%" y="-12%" width="124%" height="160%">
            <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="rgba(0,0,0,0.40)"/>
          </filter>
        </defs>

        <g filter="url(#hsh)">
          <!-- CLIP — asoma por detrás y debajo -->
          <!-- Placa de sujeción -->
          <rect x="130" y="104" width="100" height="18" rx="6" fill="url(#hcl)"/>
          <!-- Cuerpo vertical del clip -->
          <rect x="143" y="120" width="74" height="56" rx="5" fill="#1E1814"/>
          <!-- Labio de enganche inferior -->
          <rect x="133" y="172" width="94" height="16" rx="6" fill="#161210"/>
          <!-- Lengüeta delantera -->
          <rect x="142" y="184" width="76" height="10" rx="4" fill="#0E0C09"/>
          <!-- Punto magnético -->
          <ellipse cx="180" cy="113" rx="10" ry="5.5" fill="#100E0B"/>
          <ellipse cx="180" cy="113" rx="5"  ry="2.8" fill="#282420"/>

          <!-- CUERPO MADERA — cápsula muy ancha y achatada (ratio ~4:1) -->
          <rect x="20" y="34" width="320" height="78" rx="39" fill="url(#hw)"/>

          <!-- Vetas de madera (curvas suaves siguiendo el grain) -->
          <path d="M62 52 Q180 48 298 52"  stroke="rgba(44,20,6,0.30)" stroke-width="1.5" fill="none"/>
