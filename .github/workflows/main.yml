<div class="toast" id="toast"></div>

<script>
let cart=[];
function openCart(){document.getElementById('cart-panel').classList.add('open');document.getElementById('cart-overlay').classList.add('open');}
function closeCart(){document.getElementById('cart-panel').classList.remove('open');document.getElementById('cart-overlay').classList.remove('open');}
function addToCart(name,price){
  const ex=cart.find(i=>i.name===name);
  if(ex){ex.qty++;}else{cart.push({name,price,qty:1});}
  renderCart();showToast('✓ '+name+' agregado');openCart();
}
function removeFromCart(name){cart=cart.filter(i=>i.name!==name);renderCart();}
function changeQty(name,d){const it=cart.find(i=>i.name===name);if(!it)return;it.qty+=d;if(it.qty<=0)removeFromCart(name);else renderCart();}
function renderCart(){
  const ci=document.getElementById('ci'),ce=document.getElementById('cempty'),cb=document.getElementById('cbadge'),ct=document.getElementById('ctotal');
  const qty=cart.reduce((s,i)=>s+i.qty,0),amt=cart.reduce((s,i)=>s+(i.price*i.qty),0);
  cb.textContent=qty;cb.classList.toggle('on',qty>0);
  ct.textContent='$'+amt.toLocaleString('es-AR');
  ci.querySelectorAll('.citem').forEach(e=>e.remove());
  ce.style.display=cart.length?'none':'';
  cart.forEach(it=>{
    const d=document.createElement('div');d.className='citem';
    d.innerHTML=`<div class="citem-icon"><svg width="60" height="38" viewBox="0 0 220 100"><defs><linearGradient id="mc" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C89560"/><stop offset="45%" stop-color="#8C5C2C"/><stop offset="100%" stop-color="#5E3415"/></linearGradient></defs><rect x="8" y="8" width="204" height="58" rx="29" fill="url(#mc)"/><path d="M30 22 Q110 19 190 22" stroke="rgba(44,20,6,0.25)" stroke-width="1.1" fill="none"/><path d="M28 34 Q110 31 192 34" stroke="rgba(44,20,6,0.16)" stroke-width="0.8" fill="none"/><path d="M29 46 Q110 43 191 46" stroke="rgba(44,20,6,0.21)" stroke-width="1" fill="none"/><rect x="54" y="33" width="112" height="7" rx="3.5" fill="rgba(20,7,1,0.78)"/><rect x="56" y="34.5" width="108" height="4.5" rx="2.5" fill="rgba(6,1,0,0.92)"/></svg></div>
    <div class="citem-info"><div class="citem-name">${it.name}</div><div class="citem-price">$${(it.price*it.qty).toLocaleString('es-AR')}</div><div class="citem-qty"><button class="qbtn" onclick="changeQty('${it.name}',-1)">−</button><span class="qnum">${it.qty}</span><button class="qbtn" onclick="changeQty('${it.name}',1)">+</button></div></div>
    <button class="cremove" onclick="removeFromCart('${it.name}')">✕</button>`;
    ci.appendChild(d);
  });
}
function checkout(){
  if(!cart.length){showToast('Tu carrito está vacío');return;}
  const total=cart.reduce((s,i)=>s+(i.price*i.qty),0);
  const msg=encodeURIComponent('Hola! Quiero hacer el siguiente pedido:\n'+cart.map(i=>i.qty+'x '+i.name).join('\n')+'\nTotal: $'+total.toLocaleString('es-AR'));
  window.open('https://wa.me/5491100000000?text='+msg,'_blank');
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
document.querySelectorAll('a[href^="#"]').forEach(a=>{
  a.addEventListener('click',function(e){const t=document.querySelector(this.getAttribute('href'));if(t){e.preventDefault();t.scrollIntoView({behavior:'smooth'});}});
});
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)';}});
},{threshold:.1});
document.querySelectorAll('.feat-card,.prod-card,.scent-card,.stat-box').forEach(el=>{
  el.style.opacity='0';el.style.transform='translateY(18px)';el.style.transition='opacity .5s ease,transform .5s ease';obs.observe(el);
});
</script>
</body>
